<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lumen">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Lumen</title>
  <style>
    /* ── Variables y reset básico ── */
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #2a3050;
      --accent: #4f7cff;
      --accent2: #38c9a0;
      --text: #e8eaf0;
      --muted: #8892ab;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Pantalla de login ── */
    .login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 32px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 360px;
    }

    /* Logo */
    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .logo-text {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: -18px;
      text-align: center;
    }

    /* Separador */
    .divider {
      width: 100%;
      height: 0.5px;
      background: var(--border);
    }

    /* Botón de Google */
    .btn-google {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-radius: 10px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: system-ui, sans-serif;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
    }

    .btn-google:hover { background: #1e2336; }
    .btn-google:active { transform: scale(0.98); }

    /* Ícono de Google en SVG para no depender de imágenes externas */
    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Mensaje de cargando */
    .loading {
      font-size: 13px;
      color: var(--muted);
      display: none;
      text-align: center;
    }

    /* Texto de pie */
    .login-footer {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="login-box" id="login-box">

    <!-- Logo -->
    <div class="logo-icon">L</div>
    <div class="logo-text">Lumen</div>
    <div class="logo-sub">Políticas Públicas</div>

    <div class="divider"></div>

    <!-- Botón Google -->
    <button class="btn-google" onclick="loginConGoogle()">
      <!-- Ícono SVG de Google -->
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>

    <!-- Mensaje mientras carga -->
    <div class="loading" id="loading">
      Verificando sesión...
    </div>

    <div class="login-footer">
      Acceso exclusivo para usuarios autorizados<br>
      SEDUVOT Zacatecas
    </div>

  </div>

  <!-- ── Firebase Authentication ── -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // Configuración del proyecto Firebase
    // Estos datos identifican tu proyecto — no son contraseñas
    const firebaseConfig = {
      apiKey: "AIzaSyAMQAqZFTya_IRLNaw4nO8rCR6S6HKLcKU",
      authDomain: "lumen-app-ff839.firebaseapp.com",
      projectId: "lumen-app-ff839",
      storageBucket: "lumen-app-ff839.firebasestorage.app",
      messagingSenderId: "71807741500",
      appId: "1:71807741500:web:d6b83565b5c62422625d39"
    };

    // Inicializar Firebase con la configuración
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ── Detectar si ya hay sesión activa ──
    // Cuando la página carga, Firebase revisa automáticamente
    // si el usuario ya inició sesión antes
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Ya hay sesión — mandar directo a la app
        // No necesita volver a hacer login
        window.location.href = 'app.html';
      } else {
        // Sin sesión — mostrar el botón de Google
        document.getElementById('loading').style.display = 'none';
      }
    });

    // ── Función que se ejecuta al presionar "Continuar con Google" ──
    window.loginConGoogle = async function() {
      document.getElementById('loading').style.display = 'block';
      try {
        // Abre el popup de Google para elegir cuenta
        await signInWithPopup(auth, provider);
        // Si fue exitoso, onAuthStateChanged detecta al usuario
        // y redirige a app.html automáticamente
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        console.error('Error al iniciar sesión:', error.message);
        alert('No se pudo iniciar sesión. Intenta de nuevo.');
      }
    };
  </script>

</body>
</html>
